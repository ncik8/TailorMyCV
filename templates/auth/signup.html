<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Rezmycv</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f8f8f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .signup-box {
            background: #fff;
            border: 1px solid #e0e0db;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { color: rgba(10,10,10,.65); margin-bottom: 32px; font-size: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #0a0a0a; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0db;
            border-radius: 4px;
            font-size: 15px;
            font-family: inherit;
            background: #f8f8f5;
        }
        input:focus { outline: none; border-color: #0a0a0a; background: #fff; }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 14px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            color: #f8f8f5;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary:hover { opacity: 0.85; }
        .footer-text { text-align: center; margin-top: 24px; font-size: 14px; color: rgba(10,10,10,.65); }
        .footer-text a { color: #0a0a0a; font-weight: 500; text-decoration: none; }
    </style>
</head>
<body>
    <div class="signup-box">
        <h1>Create your account</h1>
        <p class="subtitle">Start with 10 free CV generations</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/auth/signup">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn-primary">Create Account — Free</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="/auth/login">Sign in</a>
        </p>
    </div>
</body>
</html>
