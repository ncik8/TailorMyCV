{% extends "base.html" %}

{% block title %}Fill in the Gaps - RezMyCV{% endblock %}

{% block content %}
<style>
:root {
    --msg-user-bg: #3b82f6;
    --msg-user-text: #ffffff;
    --msg-ai-bg: #f1f5f9;
    --msg-ai-text: #1e293b;
    --coach-color: #8b5cf6;
    --sidebar-bg: #f8fafc;
    --input-bg: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
.chat-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 70px);
    max-width: 1100px;
    margin: 0 auto;
}
/* ===== SIDEBAR ===== */
.gap-sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid #e2e8f0;
}
.sidebar-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #64748b;
    margin-bottom: 10px;
}
.progress-ring {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}
.ring-circle {
    position: relative;
    width: 44px;
    height: 44px;
}
.ring-circle svg { transform: rotate(-90deg); }
.ring-circle .bg { fill: none; stroke: #e2e8f0; stroke-width: 4; }
.ring-circle .fg {
    fill: none;
    stroke: #16a34a;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 126;
    stroke-dashoffset: 126;
    transition: stroke-dashoffset 0.5s;
}
.ring-circle span {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #0f172a;
}
.sidebar-progress-text {
    font-size: 20px;
    font-weight: 700;
    color: #0f172a;
}
.sidebar-progress-label { font-size: 12px; color: #64748b; }
.gaps-list { flex: 1; overflow-y: auto; padding: 12px 0; }
.gap-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
}
.gap-item:hover { background: #e2e8f0; }
.gap-item.active {
    background: #eff6ff;
    border-left-color: #3b82f6;
}
.gap-item.done { border-left-color: #16a34a; }
.gap-item.current .gap-item-title { font-weight: 700; }
.gap-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #cbd5e1;
    margin-top: 6px;
    flex-shrink: 0;
}
.gap-item.done .gap-dot { background: #16a34a; }
.gap-item.current .gap-dot {
    background: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
    animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } 50% { box-shadow: 0 0 0 6px rgba(59,130,246,0); } }
.gap-item-info { flex: 1; min-width: 0; }
.gap-item-title {
    font-size: 13px;
    color: #475569;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.gap-item-type {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.gap-item-type.partial { color: #d97706; }
.gap-item-type.missing { color: #dc2626; }
.gap-item-result {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.skip-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 12px 16px;
    padding: 10px;
    background: none;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    cursor: pointer;
    transition: all 0.15s;
}
.skip-btn:hover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }

/* ===== MAIN CHAT ===== */
.chat-main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.chat-header-title { font-size: 15px; font-weight: 600; color: #0f172a; }
.chat-header-sub { font-size: 12px; color: #64748b; }
.header-actions { display: flex; gap: 10px; }
.chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
    scroll-behavior: smooth;
}
.msg-row { display: flex; margin-bottom: 16px; }
.msg-row.user { justify-content: flex-end; }
.msg-row.ai { justify-content: flex-start; }
.msg-coach { align-items: center; gap: 8px; margin-bottom: 8px; }
.msg-coach-dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: white; font-weight: 700;
    flex-shrink: 0;
}
.msg-coach-name { font-size: 12px; font-weight: 600; color: var(--coach-color); }
.msg-bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.55;
}
.msg-row.user .msg-bubble {
    background: var(--msg-user-bg);
    color: var(--msg-user-text);
    border-bottom-right-radius: 4px;
}
.msg-row.ai .msg-bubble {
    background: var(--msg-ai-bg);
    color: var(--msg-ai-text);
    border-bottom-left-radius: 4px;
}
.msg-time { font-size: 10px; color: #94a3b8; margin-top: 4px; text-align: right; }
.msg-row.ai .msg-time { text-align: left; }
.msg-intro {
    background: linear-gradient(135deg, #f5f3ff, #ecfeff);
    border: 1px solid #ddd6fe;
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 20px;
    max-width: 80%;
}
.msg-intro .coach-line {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.msg-intro h3 { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
.msg-intro p { font-size: 13px; color: #475569; line-height: 1.5; }
.msg-intro .gap-count { display: inline-block; background: #8b5cf6; color: white; font-size: 12px; font-weight: 700; padding: 1px 8px; border-radius: 10px; margin-left: 4px; }

/* === typing indicator === */
.msg-typing { display: flex; gap: 4px; align-items: center; padding: 14px 18px; }
.msg-typing span {
    width: 7px; height: 7px; border-radius: 50%; background: #94a3b8;
    animation: typing-bounce 1.4s infinite both;
}
.msg-typing span:nth-child(2) { animation-delay: 0.2s; }
.msg-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* === destination picker in chat === */
.msg-dest-picker { background: white; border: 2px solid #e2e8f0; border-radius: 16px; padding: 14px; margin-top: 6px; max-width: 460px; }
.dest-picker-title { font-size: 13px; font-weight: 600; color: #0f172a; margin-bottom: 10px; text-align: center; }
.dest-picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.dest-btn {
    border: 2px solid #e2e8f0; border-radius: 10px; padding: 10px 12px;
    cursor: pointer; text-align: left; transition: all 0.15s; background: white;
}
.dest-btn:hover { border-color: #8b5cf6; background: #f5f3ff; }
.dest-btn.selected { border-color: #8b5cf6; background: #f5f3ff; }
.dest-btn-title { font-size: 13px; font-weight: 600; color: #1e293b; }
.dest-btn-sub { font-size: 11px; color: #64748b; }
.dest-btn.full { grid-column: 1 / -1; }

/* === confirmation === */
.msg-confirm {
    background: white;
    border: 2px solid #16a34a;
    border-radius: 16px;
    padding: 14px;
    margin-top: 6px;
    max-width: 460px;
}
.confirm-label { font-size: 12px; font-weight: 600; color: #166534; margin-bottom: 6px; }
.confirm-text { font-size: 14px; color: #1e293b; margin-bottom: 12px; line-height: 1.5; }
.confirm-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.confirm-actions button {
    border: none; border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
}
.btn-cancel { background: #f1f5f9; color: #475569; }
.btn-cancel:hover { background: #e2e8f0; }
.btn-confirm { background: #16a34a; color: white; }
.btn-confirm:hover { background: #15803d; }
.btn-edit { background: #f0fdf4; color: #166534; border: 1px solid #16a34a; }
.btn-edit:hover { background: #dcfce7; }

/* === progress bar ===== */
.chat-progress {
    display: flex; align-items: center; gap: 12px; padding: 8px 24px;
    border-bottom: 1px solid #f1f5f9; font-size: 12px; color: #64748b;
}
.chat-progress-bar { flex: 1; height: 3px; background: #e2e8f0; border-radius: 2px; }
.chat-progress-fill { height: 100%; background: #16a34a; border-radius: 2px; transition: width 0.4s; }
.done-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: #f0fdf4; color: #166534; font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px; border: 1px solid #bbf7d0;
}

/* === input area === */
.chat-input-area {
    border-top: 1px solid #e2e8f0;
    padding: 16px 24px;
    background: white;
}
.input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: 24px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.15s;
}
.input-wrapper:focus-within { border-color: #3b82f6; }
.gap-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 15px;
    color: #1e293b;
    resize: none;
    max-height: 120px;
    outline: none;
    line-height: 1.5;
    font-family: inherit;
}
.gap-input::placeholder { color: #94a3b8; }
.send-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: #3b82f6; color: white; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0;
}
.send-btn:hover { background: #2563eb; }
.send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
.input-hint { font-size: 11px; color: #94a3b8; margin-top: 6px; }

/* === Destination picker new UI === */
.new-dest-section {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 16px;
    margin-top: 12px;
}
.new-dest-title {
    font-size: 13px; font-weight: 700; color: #0f172a;
    margin-bottom: 4px;
}
.new-dest-sub { font-size: 12px; color: #64748b; margin-bottom: 12px; }
.new-dest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.new-dest-btn {
    border: 2px solid #e2e8f0; border-radius: 10px; padding: 12px;
    cursor: pointer; text-align: left; transition: all 0.15s; background: white;
}
.new-dest-btn:hover { border-color: #3b82f6; background: #eff6ff; }
.new-dest-btn.selected { border-color: #3b82f6; background: #dbeafe; }
.new-dest-label { font-size: 13px; font-weight: 600; color: #1e293b; }
.new-dest-sub2 { font-size: 11px; color: #64748b; }
</style>

<div class="chat-layout">
    <!-- ====== SIDEBAR ====== -->
    <aside class="gap-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Your Gaps</div>
            <div class="progress-ring">
                <div class="ring-circle">
                    <svg width="44" height="44" viewBox="0 0 44 44">
                        <circle class="bg" cx="22" cy="22" r="18"/>
                        <circle class="fg" id="progress-ring" cx="22" cy="22" r="18"/>
                    </svg>
                    <span id="progress-count">0/0</span>
                </div>
                <div>
                    <div class="sidebar-progress-text" id="sidebar-count">0/0</div>
                    <div class="sidebar-progress-label">completed</div>
                </div>
            </div>
        </div>
        <div class="gaps-list" id="gaps-list">
            <!-- populated by JS -->
        </div>
        <a href="/cv/tailor" class="skip-btn" style="text-align: center; text-decoration: none;">
            Skip to Tailor CV →
        </a>
    </aside>

    <!-- ====== MAIN CHAT ====== -->
    <main class="chat-main">
        <div class="chat-progress">
            <span id="chat-progress-label">Let's get started</span>
            <div class="chat-progress-bar">
                <div class="chat-progress-fill" id="chat-progress-fill" style="width: 0%"></div>
            </div>
            <span id="chat-progress-pct">0%</span>
        </div>
        <div class="chat-header">
            <div>
                <div class="chat-header-title">Fill in the Gaps</div>
                <div class="chat-header-sub">Career Coaching Session</div>
            </div>
            <div class="header-actions">
                <a href="/gap/analyze" class="btn btn-secondary" style="font-size: 13px; padding: 8px 14px;">← Back</a>
            </div>
        </div>
        <div class="chat-body" id="chat-body">
            <!-- Messages populated by JS -->
        </div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="gap-input" class="gap-input" placeholder="Type your answer here... (Ctrl+Enter to send)" rows="1"></textarea>
                <button onclick="sendMessage()" id="send-btn" class="send-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
            <div class="input-hint">Type your answer — I'll turn it into professional CV language</div>
        </div>
    </main>
</div>

<script>
// ============================================
// State
// ============================================
let allGaps = [];
let startMessages = [];
try {
    const rawGaps = '{{ all_gaps_json | tojson }}';
    allGaps = JSON.parse(rawGaps);
} catch(e) {
    console.error('all_gaps_json parse error:', e, 'raw:', '{{ all_gaps_json | tojson }}');
}
try {
    startMessages = JSON.parse('{{ start_messages_json | tojson }}');
} catch(e) {
    console.error('start_messages_json parse error:', e);
}
let currentIdx = 0;
let stage = 'intro'; // intro | asking | interpreting | picking-dest | confirming | done
let currentAnswer = '';
let currentInterpreted = '';
let currentCategory = '';
let currentDestinations = [];
let currentDestinationLabel = '';
let selectedJobIdx = -1;
let currentAnswerObj = null; // for re-confirming after edit
let messages = [...startMessages];

// ============================================
// helpers
// ============================================
function scrollBottom() {
    requestAnimationFrame(() => {
        const el = document.getElementById('chat-body');
        el.scrollTop = el.scrollHeight;
    });
}

function formatTime() {
    return new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
}

function setProgress(completed, total) {
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
    const ring = document.getElementById('progress-ring');
    const circumference = 126;
    ring.style.strokeDashoffset = circumference - (pct / 100) * circumference;
    document.getElementById('progress-count').textContent = `${completed}/${total}`;
    document.getElementById('sidebar-count').textContent = `${completed}/${total}`;
    document.getElementById('chat-progress-pct').textContent = `${pct}%`;
    const fill = document.getElementById('chat-progress-fill');
    fill.style.width = `${pct}%`;
}

function buildDestLabel(dest) {
    if (dest.type === 'job') return `${dest.title || 'Work'} @ ${dest.company || ''}`;
    return dest.label || dest.type || 'CV Profile';
}

// ============================================
// Render gaps list in sidebar
// ============================================
function renderSidebar() {
    const list = document.getElementById('gaps-list');
    let html = '';
    let completed = 0;
    allGaps.forEach((item, i) => {
        const isDone = !!item.answer;
        const isCurrent = i === currentIdx && !isDone;
        if (isDone) completed++;
        html += `<div class="gap-item ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}" onclick="jumpToGap(${i})">
            <div class="gap-dot"></div>
            <div class="gap-item-info">
                <div style="display:flex;align-items:center;gap:6px;">
                    <span class="gap-item-title">${item.requirement}</span>
                </div>
                <div><span class="gap-item-type ${item.type}">${item.type}</div>
                ${isDone && item.answer ? `<div class="gap-item-result">✓ ${item.answer.ai_phrased.substring(0,40)}...</div>` : ''}
            </div>
        </div>`;
    });
    list.innerHTML = html;
    setProgress(completed, allGaps.length);
    if (allGaps.length > 0) {
        document.getElementById('chat-progress-label').textContent = `Gap ${Math.min(currentIdx+1, allGaps.length)} of ${allGaps.length}`;
    }
}

function jumpToGap(idx) {
    currentIdx = idx;
    stage = 'asking';
    // rebuild messages up to this point from stored answers
    rebuildChat();
}

// ============================================
// Build initial messages array from session answers
// ============================================
function buildStartMessages() {
    const msgs = [];
    for (let i = 0; i < allGaps.length; i++) {
        const item = allGaps[i];
        if (item.answer) {
            // This gap was answered — show the full exchange
            msgs.push({
                role: 'coach',
                text: `Let's talk about: ${item.requirement}`,
                requirement: item.requirement,
                question: item.question || getDefaultQuestion(item.requirement, item.type),
                timestamp: formatTime()
            });
            msgs.push({ role: 'user', text: item.answer.user_answer, timestamp: formatTime() });
            msgs.push({
                role: 'ai',
                text: `Great story. Here's how I'll add it to your CV:\n\n"${item.answer.ai_phrased}"`,
                destination: item.answer.destination || { label: 'CV Profile' },
                confirmed: true,
                timestamp: formatTime()
            });
        }
    }
    return msgs;
}

function getDefaultQuestion(req, type) {
    const q = type === 'partial'
        ? `Tell me more about your experience with ${req}. What did you actually do?`
        : `Tell me about your experience with ${req}. Even a brief story or example helps!`;
    return q;
}

// ============================================
// Rebuild full chat from gaps + answers
// ============================================
function rebuildChat() {
    const body = document.getElementById('chat-body');
    body.innerHTML = '';
    messages = buildStartMessages();
    renderAllMessages();
    if (messages.length === 0) {
        // Fresh start — show intro
        appendIntro();
        if (allGaps.length > 0) {
            currentIdx = allGaps.findIndex(g => !g.answer);
            if (currentIdx < 0) currentIdx = allGaps.length - 1;
            sendCoachMessage(currentIdx);
        }
    } else {
        // Resume — pick up from last unanswered or go to next
        const lastAnswered = allGaps.findLastIndex(g => g.answer);
        currentIdx = lastAnswered >= 0 ? lastAnswered + 1 : 0;
        if (currentIdx >= allGaps.length) {
            stage = 'done';
            appendDone();
        } else {
            stage = 'asking';
            sendCoachMessage(currentIdx);
        }
    }
    scrollBottom();
}

// ============================================
// Render all messages
// ============================================
function renderAllMessages() {
    const body = document.getElementById('chat-body');
    body.innerHTML = '';
    messages.forEach(m => appendMsg(m));
}

// ============================================
// Append intro
// ============================================
function appendIntro() {
    const total = allGaps.length;
    const partials = allGaps.filter(g => g.type === 'partial').length;
    const missing = total - partials;
    const body = document.getElementById('chat-body');
    const div = document.createElement('div');
    div.className = 'msg-row ai';
    div.innerHTML = `
<div class="msg-intro" style="margin-bottom: 20px;">
    <div class="coach-line">
        <div class="msg-coach-dot">C</div>
        <span class="msg-coach-name">Career Coach</span>
    </div>
    <h3>Alright ${cvName}, let's close the gaps! 🎯</h3>
    <p>I've found <strong>${total} gaps</strong> between your CV and this job:
    ${partials > 0 ? `<strong>${partials} partial</strong>` : ''}${partials > 0 && missing > 0 ? ' and ' : ''}${missing > 0 ? `<strong>${missing} missing</strong>` : ''}.
    For each one, I'll ask you a question — just answer in your own words. I'll turn it into professional CV language and add it to your profile.</p>
</div>`;
    body.appendChild(div);
}

// ============================================
// Append a single message
// ============================================
function appendMsg(m) {
    const body = document.getElementById('chat-body');
    const div = document.createElement('div');

    if (m.role === 'coach' || m.role === 'ai' || m.role === 'typing') {
        div.className = 'msg-row ai';
        if (m.role === 'typing') {
            div.innerHTML = `<div class="msg-bubble msg-typing"><span></span><span></span><span></span></div>`;
        } else {
            const label = m.role === 'coach' ? 'Career Coach' : 'AI Assistant';
            const dot = m.role === 'coach' ? 'C' : 'AI';
            let bubble = `<div class="msg-coach" style="margin-bottom:4px;"><div class="msg-coach-dot">${dot}</div><span class="msg-coach-name">${label}</span></div>`;
            bubble += `<div class="msg-bubble">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div>`;

            if (m.showDestPicker) {
                bubble += buildDestPickerHTML(m.destinations, m.interpreted);
            }
            if (m.showConfirm) {
                bubble += buildConfirmHTML(m.interpreted, m.confirmationLabel || m.destinationLabel || 'your CV');
            }

            div.innerHTML = bubble;

            if (m.showDestPicker) {
                const grid = div.querySelector('.new-dest-section');
                if (grid) grid.style.display = 'block';
            }
        }
    } else if (m.role === 'user') {
        div.className = 'msg-row user';
        div.innerHTML = `<div class="msg-bubble">${escapeHtml(m.text)}</div>`;
    } else if (m.role === 'system') {
        div.className = 'msg-row ai';
        div.innerHTML = `<div class="msg-bubble" style="font-size:13px;color:#64748b;font-style:italic;">${escapeHtml(m.text)}</div>`;
    }

    body.appendChild(div);
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"');
}

// ============================================
// Build destination picker HTML
// ============================================
function buildDestPickerHTML(destinations, interpreted) {
    let html = `<div class="new-dest-section" id="dest-picker-section">
        <div class="new-dest-title">Great! Where should I add this?</div>
        <div class="new-dest-sub">I interpreted your answer as: <em>"${interpreted.substring(0,60)}..."</em></div>
        <div class="new-dest-grid">`;
    destinations.forEach((d, i) => {
        const label = d.type === 'job' ? `${d.title || 'Work'} @ ${d.company || ''}` : (d.label || d.type);
        const sub = d.type === 'job' ? (d.years || '') : '';
        html += `<button class="new-dest-btn" onclick="selectDest(${i}, this)" id="dest-btn-${i}">
            <div class="new-dest-label">${label}</div>${sub ? `<div class="new-dest-sub2">${sub}</div>` : ''}
        </button>`;
    });
    html += `</div></div>`;
    return html;
}

// ============================================
// Build confirmation HTML
// ============================================
function buildConfirmHTML(interpreted, destLabel) {
    return `<div class="msg-confirm" id="confirm-section">
        <div class="confirm-label">Adding to ${destLabel}</div>
        <div class="confirm-text">"${interpreted}"</div>
        <textarea class="edit-textarea" id="confirm-edit" rows="2" style="width:100%;border:1px solid #e2e8f0;border-radius:wbkit-autofill:inactive8px;padding:8px;font-size:13px;margin-bottom:10px;resize:none;">${interpreted}</textarea>
        <div class="confirm-actions">
            <button class="btn-cancel" onclick="skipGap()">Skip</button>
            <button class="btn-edit" onclick="editAndConfirm()">Edit & Add</button>
            <button class="btn-confirm" onclick="confirmGap()">✓ Yes, Add to CV</button>
        </div>
    </div>`;
}

// ============================================
// Append AI typing indicator then remove
// ============================================
function showTyping() {
    const body = document.getElementById('chat-body');
    const div = document.createElement('div');
    div.className = 'msg-row ai';
    div.id = 'typing-msg';
    div.innerHTML = `<div class="msg-bubble msg-typing"><span></span><span></span><span></span></div>`;
    body.appendChild(div);
    scrollBottom();
}

function hideTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
}

// ============================================
// Send coach message for gap at idx
// ============================================
function sendCoachMessage(idx) {
    stage = 'asking';
    const item = allGaps[idx];
    const question = item.question || getDefaultQuestion(item.requirement, item.type);

    messages.push({ role: 'coach', text: question, requirement: item.requirement, timestamp: formatTime() });
    appendMsg({ role: 'coach', text: question });

    // Update sidebar
    renderSidebar();
    scrollBottom();
}

// ============================================
// process user message
// ============================================
async function sendMessage() {
    const input = document.getElementById('gap-input');
    const text = input.value.trim();
    if (!text) return;
    if (stage !== 'asking') return;

    currentAnswer = text;
    input.value = '';
    document.getElementById('send-btn').disabled = true;

    // Append user message
    messages.push({ role: 'user', text: text, timestamp: formatTime() });
    appendMsg({ role: 'user', text: text });
    scrollBottom();
    stage = 'interpreting';

    // Show typing + call /gap/interpret
    showTyping();
    try {
        const resp = await fetch('/gap/interpret', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ requirement: allGaps[currentIdx].requirement, answer: text })
        });
        const data = await resp.json();
        hideTyping();

        if (!data.success) {
            appendMsg({ role: 'system', text: 'Error: ' + (data.error || 'Something went wrong') });
            stage = 'asking';
            document.getElementById('send-btn').disabled = false;
            return;
        }

        currentInterpreted = data.interpreted || text;
        currentCategory = data.category || 'other';
        currentDestinations = data.destinations || [{ type: 'category', label: 'Add to Summary' }];

        stage = 'picking-dest';
        const destLabel = data.category_label || currentCategory;

        const aiMsg = {
            role: 'ai',
            text: `Love it! Here's how that translates to your CV:\n\n"${currentInterpreted}"\n\nWhere would you like me to add this?`,
            showDestPicker: true,
            destinations: currentDestinations,
            interpreted: currentInterpreted,
            destinationLabel: destLabel
        };
        messages.push(aiMsg);
        appendMsg(aiMsg);
        scrollBottom();
        document.getElementById('send-btn').disabled = false;

    } catch(err) {
        hideTyping();
        appendMsg({ role: 'system', text: 'Network error: ' + err.message });
        stage = 'asking';
        document.getElementById('send-btn').disabled = false;
    }
}

// ============================================
// User picks destination
// ============================================
function selectDest(idx, btn) {
    document.querySelectorAll('.dest-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    const dest = currentDestinations[idx];
    selectedJobIdx = dest.type === 'job' ? (dest.job_idx ?? 0) : -1;

    // Jump to confirming stage
    stage = 'confirming';
    const destLabel = buildDevetLabel ? buildDestLabel(dest) : (dest.label || 'CV Profile');

    const confirmMsg = {
        role: 'ai',
        text: `Perfect! I'll add this to ${destLabel}. Does this look right?`,
        showConfirm: true,
        interpreted: currentInterpreted,
        confirmationLabel: destLabel
    };
    messages.push(confirmMsg);
    appendMsg(confirmMsg);
    scrollBottom();
}

// Fix: buildDestLabel not defined
function buildDestLabel(dest) {
    if (dest.type === 'job') return `${dest.title || 'Work'} @ ${dest.company || ''}`;
    return dest.label || dest.type || 'CV Profile';
}

// ============================================
// Confirm / Edit-and-confirm / Skip
// ============================================
async function confirmGap() {
    await finalizeGap(currentDestinations.findIndex(d => document.querySelector('.dest-btn.selected') !== null) || 0);
}

async function editAndConfirm() {
    const edited = document.getElementById('confirm-edit')?.value.trim() || currentInterpreted;
    currentInterpreted = edited;
    currentDestinations[0].interpreted = edited;
    await finalizeGap(selectedJobIdx >= 0 ? currentDestinations.findIndex(d => d.type === 'job' && d.job_idx === selectedJobIdx) : 0);
}

async function skipGap() {
    allGaps[currentIdx].answer = { requirement: allGaps[currentIdx].requirement, user_answer: currentAnswer, ai_phrased: currentInterpreted, skipped: true };
    await moveToNextGap();
}

// ============================================
// Finalize and move to next
// ============================================
async function finalizeGap(destIdx) {
    const dest = currentDestinations[destIdx >= 0 ? destIdx : 0] || { type: 'category', label: 'CV Profile' };

    showTyping();
    try {
        // Step 2: apply to CV
        const resp1 = await fetch('/gap/confirm-destination', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                requirement: allGaps[currentIdx].requirement,
                answer: currentAnswer,
                interpreted: currentInterpreted,
                category: currentCategory,
                destination: dest
            })
        });
        const data1 = await resp1.json();
        hideTyping();

        if (!data1.success) {
            appendMsg({ role: 'system', text: 'Error: ' + (data1.error || 'Failed to save') });
            return;
        }

        // Step 3: confirm and save
        const resp2 = await fetch('/gap/confirm-answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                requirement: allGaps[currentIdx].requirement,
                answer: currentAnswer,
                interpreted: currentInterpreted,
                category: currentCategory,
                destination: dest,
                cv_modification: data1.cv_modification || {}
            })
        });
        const data2 = await resp2.json();

        if (!data2.success) {
            appendMsg({ role: 'system', text: 'Error saving: ' + (data2.error || 'Failed to save') });
            return;
        }

        // Mark gap as answered
        allGaps[currentIdx].answer = {
            requirement: allGaps[currentIdx].requirement,
            user_answer: currentAnswer,
            ai_phrased: currentInterpreted,
            destination: dest
        };
        messages.push({ role: 'ai', text: `✅ Done! I've updated your CV profile. Ready for the next one?` });

        await moveToNextGap();

    } catch(err) {
        hideTyping();
        appendMsg({ role: 'system', text: 'Network error: ' + err.message });
    }
}

async function moveToNextGap() {
    currentIdx++;
    if (currentIdx >= allGaps.length) {
        stage = 'done';
        appendDone();
    } else {
        stage = 'asking';
        sendCoachMessage(currentIdx);
    }
    renderSidebar();
    scrollBottom();
}

// ============================================
// Done state
// ============================================
function appendDone() {
    const body = document.getElementById('chat-body');
    const div = document.createElement('div');
    div.className = 'msg-row ai';
    const answered = allGaps.filter(g => g.answer && !g.answer.skipped).length;
    div.innerHTML = `<div class="msg-intro">
        <div class="coach-line"><div class="msg-coach-dot">C</div><span class="msg-coach-name">Career Coach</span></div>
        <h3>🎉 Fantastic work, ${cvName}!</h3>
        <p>You've addressed <strong>${answered} of ${allGaps.length} gaps</strong>. Your CV profile is now stronger and better positioned for this role. Let's generate your tailored CV!</p>
        <div style="margin-top: 16px; text-align: center;">
            <a href="/cv/tailor" class="btn btn-success" style="font-size: 16px; padding: 14px 32px;">Generate My Tailored CV →</a>
        </div>
    </div>`;
    body.appendChild(div);
    document.getElementById('chat-progress-label').textContent = 'All done!';
}

// ============================================
// Keyboard shortcut
// ============================================
document.getElementById('gap-input')?.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        sendMessage();
    }
    if (e.key === 'Escape') {
        this.blur();
    }
});

// Auto-resize textarea
document.getElementById('gap-input')?.addEventListener('input', function() {
    this.style.height = '';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ============================================
// Init
// ============================================
(function init() {
    const cvData = JSON.parse('{{ cv_data_json | tojson }}');
    cvName = cvData?.name?.split(' ')[0] || 'there';
    renderSidebar();
    rebuildChat();
    setTimeout(() => scrollBottom(), 100);
})();
</script>
{% endblock %}
